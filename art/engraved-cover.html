<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndDream · Engraved Continuum</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh; color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input { width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center; }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217,119,87,0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 55px; text-align: right; }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20,20,19,0.1); background: white; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
<div class="sidebar">
    <h1>Engraved Continuum</h1>
    <div class="subtitle">AndDream · Brand Cover<br>Copperplate engraving generative art</div>

    <div class="control-section">
        <h3>Seed</h3>
        <input type="number" id="seed-input" class="seed-input" value="42017" onchange="updateSeed()">
        <div class="seed-controls">
            <button class="button secondary" onclick="previousSeed()">← Prev</button>
            <button class="button secondary" onclick="nextSeed()">Next →</button>
        </div>
        <button class="button tertiary" onclick="randomSeedAndUpdate()">↻ Random</button>
    </div>

    <div class="control-section">
        <h3>Parameters</h3>

        <div class="control-group">
            <label>Line Count</label>
            <div class="slider-container">
                <input type="range" id="lineCount" min="2000" max="12000" step="200" value="5000" oninput="updateParam('lineCount', this.value)">
                <span class="value-display" id="lineCount-value">5000</span>
            </div>
        </div>

        <div class="control-group">
            <label>Hatch Angles</label>
            <div class="slider-container">
                <input type="range" id="hatchAngles" min="2" max="5" step="1" value="3" oninput="updateParam('hatchAngles', this.value)">
                <span class="value-display" id="hatchAngles-value">3</span>
            </div>
        </div>

        <div class="control-group">
            <label>Waviness</label>
            <div class="slider-container">
                <input type="range" id="waviness" min="0.2" max="4.0" step="0.1" value="1.5" oninput="updateParam('waviness', this.value)">
                <span class="value-display" id="waviness-value">1.5</span>
            </div>
        </div>

        <div class="control-group">
            <label>Fade Probability</label>
            <div class="slider-container">
                <input type="range" id="fadeProb" min="0.0" max="0.6" step="0.02" value="0.18" oninput="updateParam('fadeProb', this.value)">
                <span class="value-display" id="fadeProb-value">0.18</span>
            </div>
        </div>

        <div class="control-group">
            <label>Line Weight</label>
            <div class="slider-container">
                <input type="range" id="lineWeight" min="0.3" max="2.5" step="0.1" value="0.8" oninput="updateParam('lineWeight', this.value)">
                <span class="value-display" id="lineWeight-value">0.8</span>
            </div>
        </div>

        <div class="control-group">
            <label>Density Contrast</label>
            <div class="slider-container">
                <input type="range" id="contrast" min="0.5" max="3.0" step="0.1" value="1.6" oninput="updateParam('contrast', this.value)">
                <span class="value-display" id="contrast-value">1.6</span>
            </div>
        </div>
    </div>

    <div class="control-section">
        <h3>Actions</h3>
        <div class="button-row">
            <button class="button" onclick="resetParameters()">Reset</button>
        </div>
    </div>
</div>

<div class="canvas-area">
    <div id="canvas-container">
        <div class="loading">Engraving the plate...</div>
    </div>
</div>
</div>

<script>
let params = {
    seed: 42017,
    lineCount: 5000,
    hatchAngles: 3,
    waviness: 1.5,
    fadeProb: 0.18,
    lineWeight: 0.8,
    contrast: 1.6
};
let defaultParams = JSON.parse(JSON.stringify(params));

// ── p5.js : Engraved Continuum ──

function setup() {
    let canvas = createCanvas(1200, 1600);
    canvas.parent('canvas-container');
    generate();
    document.querySelector('.loading').style.display = 'none';
}

function generate() {
    randomSeed(params.seed);
    noiseSeed(params.seed);

    // Warm paper
    background(250, 249, 245);

    let w = width, h = height;
    let cx = w / 2, cy = h * 0.44;

    // Build the density field: layered noise + radial gradient
    // Dense at center-left, fading to edges — like text on a page
    let densityField = [];
    let step = 6;
    let cols = floor(w / step) + 1;
    let rows = floor(h / step) + 1;

    for (let y = 0; y < rows; y++) {
        densityField[y] = [];
        for (let x = 0; x < cols; x++) {
            let px = x * step, py = y * step;
            // Radial gradient: center-weighted
            let dx = (px - cx) / (w * 0.55);
            let dy = (py - cy) / (h * 0.45);
            let dist = sqrt(dx * dx + dy * dy);
            let radial = pow(max(0, 1 - dist), 2.2);

            // Noise layers for organic density variation
            let n1 = noise(px * 0.002, py * 0.002) * 0.7;
            let n2 = noise(px * 0.005 + 100, py * 0.005 + 100) * 0.3;
            let n = n1 + n2;

            densityField[y][x] = constrain(radial * n * params.contrast, 0.02, 1.0);
        }
    }

    // Determine hatch angles
    let baseAngle = random(TWO_PI);
    let angles = [];
    let goldenAngle = TWO_PI * 0.381966; // golden ratio conjugate
    for (let i = 0; i < params.hatchAngles; i++) {
        angles.push(baseAngle + i * goldenAngle);
    }

    // Draw lines
    let linesDrawn = 0;
    let maxAttempts = params.lineCount * 3;
    let attempts = 0;

    strokeCap(ROUND);

    while (linesDrawn < params.lineCount && attempts < maxAttempts) {
        attempts++;

        // Pick random start point, biased toward high-density regions
        let sx = random(w);
        let sy = random(h);

        // Rejection sampling toward density
        let dx = floor(sx / step);
        let dy = floor(sy / step);
        if (dx < 0 || dx >= cols || dy < 0 || dy >= rows) continue;
        let dVal = densityField[dy][dx];
        if (random() > dVal * 1.3) continue; // bias toward dense areas

        // Pick hatch angle nearest to perpendicular to density gradient
        let angleIdx = floor(random(angles.length));
        let angle = angles[angleIdx];

        // Determine if this line will fade
        let willFade = random() < params.fadeProb;
        let lineLen = willFade ? random(30, 180) : random(40, 300);

        // Line weight varies along stroke
        let baseWeight = params.lineWeight * (0.6 + dVal * 0.8);
        let weightStart = baseWeight * random(0.7, 1.3);
        let weightEnd = willFade ? weightStart * random(0.05, 0.3) : weightStart * random(0.6, 1.0);

        // Compute endpoints
        let ex = sx + cos(angle) * lineLen;
        let ey = sy + sin(angle) * lineLen;

        // If line goes off canvas, trim it
        if (ex < -20 || ex > w + 20 || ey < -20 || ey > h + 20) {
            let t = 1.0;
            if (ex < 0) t = min(t, -sx / (ex - sx));
            if (ex > w) t = min(t, (w - sx) / (ex - sx));
            if (ey < 0) t = min(t, -sy / (ey - sy));
            if (ey > h) t = min(t, (h - sy) / (ey - sy));
            ex = sx + cos(angle) * lineLen * t;
            ey = sy + sin(angle) * lineLen * t;
            lineLen *= t;
        }
        if (lineLen < 6) continue;

        // Draw the line with varying weight and perturbation
        let segments = floor(lineLen / 4);
        if (segments < 1) segments = 1;

        noFill();
        beginShape();
        for (let i = 0; i <= segments; i++) {
            let t = i / segments;
            let px = lerp(sx, ex, t);
            let py = lerp(sy, ey, t);

            // Perturbation: waviness
            if (params.waviness > 0.01) {
                let perpX = -sin(angle);
                let perpY = cos(angle);
                let perturb = (noise(px * 0.03, py * 0.03) - 0.5) * params.waviness * 3;
                px += perpX * perturb;
                py += perpY * perturb;
            }

            // Weight interpolation
            let wt = lerp(weightStart, weightEnd, t);
            // Ink color: slightly varied opacity for organic feel
            let inkAlpha = map(dVal, 0.02, 1.0, 18, 85) + random(-5, 5);
            stroke(20, 20, 20, constrain(inkAlpha, 8, 95));
            strokeWeight(constrain(wt, 0.15, 3.5));

            if (i === 0) {
                vertex(px, py);
            } else {
                // Occasional micro-gap (stutter)
                if (willFade && t > 0.6 && random() < 0.08) {
                    endShape();
                    if (i < segments) {
                        beginShape();
                        let nt = (i + 0.3) / segments;
                        let nx = lerp(sx, ex, nt);
                        let ny = lerp(sy, ey, nt);
                        vertex(nx, ny);
                    }
                }
                vertex(px, py);
            }
        }
        endShape();

        linesDrawn++;
    }
}

// ── UI Handlers ──

function updateParam(name, value) {
    let v = parseFloat(value);
    params[name] = v;
    document.getElementById(name + '-value').textContent = v;
    generate();
}

function updateSeed() {
    let input = document.getElementById('seed-input');
    let newSeed = parseInt(input.value);
    if (newSeed && newSeed > 0) {
        params.seed = newSeed;
        generate();
    }
}

function previousSeed() {
    params.seed = Math.max(1, params.seed - 1);
    document.getElementById('seed-input').value = params.seed;
    generate();
}

function nextSeed() {
    params.seed += 1;
    document.getElementById('seed-input').value = params.seed;
    generate();
}

function randomSeedAndUpdate() {
    params.seed = floor(random(1, 999999));
    document.getElementById('seed-input').value = params.seed;
    generate();
}

function resetParameters() {
    params = JSON.parse(JSON.stringify(defaultParams));
    ['lineCount','hatchAngles','waviness','fadeProb','lineWeight','contrast'].forEach(k => {
        document.getElementById(k).value = params[k];
        document.getElementById(k + '-value').textContent = params[k];
    });
    document.getElementById('seed-input').value = params.seed;
    generate();
}

window.addEventListener('load', () => {
    document.getElementById('seed-input').value = params.seed;
});
</script>
</body>
</html>
